phases:
  - phase_key: "phase_2_autoplan"
    name: "Phase 2: Autoplan"
    prompt: |
      Use the gstack autoplan skill in claude code.

      The selected TODO is {todo_id} — it is already marked in-flight in TODOS.md.
      Work on {todo_id} only; do not pick a different TODO.

      1. Run CEO/Eng/UI/DX reviews for {todo_id}.
      2. Write all plan and auxiliary documents into docs/pipeline/ (e.g., {todo_id}-plan.md and any review artifacts).
      3. Create a new branch from main.
      4. Commit all generated docs.
      5. Save the branch name to .hermes/pipeline_branch.txt.
    tools: "Read,Write,Bash"
    turns: 20
    timeout: 1800
  - phase_key: "phase_2b_plan_gate"
    name: "Phase 2b: Plan Gate"
    gate: true
  - phase_key: "phase_3_writing_plan"
    name: "Phase 3: Writing Plan"
    prompt: "Use the writing-plans skill in claude code. Read the plan from docs/pipeline/{todo_id}-plan.md, convert it into superpowers plan format, and save it to docs/pipeline/{todo_id}-impl-plan.md. Commit the generated docs."
    tools: "Read,Write,Bash"
    turns: 15
    timeout: 1800
  - phase_key: "phase_4_development"
    name: "Phase 4: Development"
    prompt: "Use subagent-driven-development in claude code. Read the implementation plan from docs/pipeline/{todo_id}-impl-plan.md and implement it. Commit all generated docs."
    tools: "Read,Write,Edit,Bash"
    turns: 60
    timeout: 3600
  - phase_key: "phase_5_review"
    name: "Phase 5: Code Review"
    prompt: |
      Use the gstack /review skill on the current branch.

      AUTONOMOUS MODE — there is no human at the terminal. Apply the review's
      fixes without asking for confirmation. Do NOT pause for user input.

      Scope: {todo_id}. Focus on correctness bugs and simplification cleanups
      in the changes on this branch. Apply fixes directly to the working tree.
      Do NOT run tests, commit, revert, or reset — the pipeline does that after
      you finish.
    tools: "Read,Edit,Bash"
    turns: 30
    timeout: 2400
  - phase_key: "phase_6_1_cso"
    name: "Phase 6.1: CSO Security Review"
    prompt: "Use the gstack cso skill. Run a security review of the current branch. Save findings to docs/pipeline/ and commit."
    tools: "Read,Write,Bash"
    turns: 20
    timeout: 1800
  - phase_key: "phase_7_document_release"
    name: "Phase 7: Document Release"
    prompt: |
      Generate release docs.
      1. Update CHANGELOG.md.
      2. Update README.md project structure if changed.
      3. Commit.
    tools: "Read,Write,Edit,Bash"
    turns: 15
    timeout: 1800
  - phase_key: "phase_8_finish_branch"
    name: "Phase 8: Finish Branch"
    prompt: "Use superpowers finishing-a-development-branch. Open a PR and HALT — do NOT merge."
    tools: "Read,Write,Bash"
    turns: 15
    timeout: 1800
  - phase_key: "phase_9_ship"
    name: "Phase 9: Ship Gate"
    gate: true
    terminal: true
