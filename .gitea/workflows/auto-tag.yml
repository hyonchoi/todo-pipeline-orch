name: Auto Tag

on:
  push:
    branches: [main]

# Only one tagging job at a time per ref — newer pushes cancel older ones.
concurrency:
  group: tag-${{ gitea.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  auto-tag:
    name: tag latest version
    runs-on: ubuntu-latest
    steps:
      - uses: gitea/checkout@refs/tags/v1.0.0

      - name: Read version
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "version=${VERSION}"
          echo "VERSION=${VERSION}" >> $GITEA_ENV

      - name: Create tag if missing
        run: |
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "::notice::Tag ${TAG} already exists — skipping"
            exit 0
          fi
          echo "::notice::Creating and pushing tag ${TAG}"
          git config user.name "${GITEA_ACTOR}"
          git config user.email "${GITEA_ACTOR}@users.noreply.gitea.io"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
